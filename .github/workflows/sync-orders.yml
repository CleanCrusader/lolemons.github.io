name: Sync Amazon Orders

# Runs on a schedule to pull new unshipped FBM orders from Amazon and file a
# GitHub Issue for each one. Also runnable manually from the Actions tab.
#
# Required repo secrets (Settings > Secrets and variables > Actions):
#   LWA_CLIENT_ID
#   LWA_CLIENT_SECRET
#   LWA_REFRESH_TOKEN
# Optional repo variable:
#   SPAPI_MARKETPLACE_ID   (defaults to US: ATVPDKIKX0DER)

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  sync-orders:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run sync
        env:
          LWA_CLIENT_ID: ${{ secrets.LWA_CLIENT_ID }}
          LWA_CLIENT_SECRET: ${{ secrets.LWA_CLIENT_SECRET }}
          LWA_REFRESH_TOKEN: ${{ secrets.LWA_REFRESH_TOKEN }}
          SPAPI_MARKETPLACE_ID: ${{ vars.SPAPI_MARKETPLACE_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-orders.js
