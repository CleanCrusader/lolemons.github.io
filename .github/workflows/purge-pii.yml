name: Purge Old Order PII

# Daily compliance job: nulls out buyer name/address on orders once they're
# past the 30-day retention window (set automatically by sync-orders.js
# and confirm-shipment.js whenever an order becomes shipped/canceled).
#
# Required repo secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY

on:
  schedule:
    - cron: "0 9 * * *" # once daily
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  purge-pii:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Purge old PII
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/purge-old-pii.js
