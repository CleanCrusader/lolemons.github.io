<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Management — Lots of Lemon</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  body { padding: 48px 24px 80px; }
  .admin-wrap { max-width: 640px; margin: 0 auto; }
  .auth-box { max-width: 380px; margin: 80px auto; text-align: center; }
  .auth-box input {
    width: 100%; padding: 12px 14px; margin: 10px 0; border-radius: var(--radius);
    border: 2px solid rgba(26,46,16,0.15); background: #fff; color: var(--ink);
    font-family: var(--font-body); font-size: 0.95rem;
  }
  .auth-box input:focus { outline: none; border-color: var(--zest); }
  .auth-box .btn { width: 100%; margin-top: 8px; }
  .auth-error { color: var(--rust); font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }
  .price-row {
    display: grid; grid-template-columns: 1fr auto auto; gap: 14px; align-items: center;
    background: var(--mist); border: 1px solid rgba(26,46,16,0.1);
    border-radius: var(--radius); padding: 18px 20px; margin-bottom: 14px;
  }
  .price-row .name { font-weight: 600; color: var(--ink); }
  .price-row .sku { font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-muted); }
  .price-row input {
    width: 110px; padding: 12px 14px; border-radius: var(--radius);
    border: 2px solid rgba(26,46,16,0.15); background: #fff; color: var(--ink);
    font-size: 1rem; font-family: var(--font-mono); text-align: right;
  }
  .price-row input:focus { outline: none; border-color: var(--zest); }
  .row-status { grid-column: 1 / -1; font-size: 0.82rem; min-height: 1.1em; }
  .note { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 24px; }
</style>
</head>
<body>
<div class="admin-wrap">

  <div class="auth-box" data-auth-box>
    <h2>Price Management</h2>
    <input type="password" data-admin-password placeholder="Admin password" autocomplete="current-password">
    <button class="btn btn-primary" data-auth-btn>Continue</button>
    <p class="auth-error" data-auth-error></p>
  </div>

  <div data-panel style="display:none;">
    <h1 style="margin-bottom:8px;">Price Management</h1>
    <p class="note">Set a product's price. This updates Stripe (the price customers are charged) and the price shown on the site. Takes effect immediately.</p>
    <div data-price-rows></div>
  </div>

</div>

<script>
(function () {
  const PRODUCTS = [
    { sku: "FV-LNLR-DPRX", name: "Clean Crusader — 24oz" },
    { sku: "IT-3U6C-E8HZ", name: "Concentrate — 16oz" },
    { sku: "LOL1A", name: "Pet Odor & Stain Eliminator" },
  ];
  const SUPABASE_URL = "https://fkdjfrvyytkiutmwkzap.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrZGpmcnZ5eXRraXV0bXdremFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzMjYxMjUsImV4cCI6MjA5NzkwMjEyNX0.FYdTWjSWLuYPbxqsJ_U35_WYidlITNe1rx_hgQ0H9YI";

  let pw = "";
  const $ = (s) => document.querySelector(s);

  async function loadPrices() {
    try {
      const url = new URL(`${SUPABASE_URL}/rest/v1/inventory`);
      url.searchParams.set("select", "sku,price");
      const res = await fetch(url, { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } });
      const rows = res.ok ? await res.json() : [];
      const bySku = {}; rows.forEach((r) => bySku[r.sku] = r.price);
      return bySku;
    } catch { return {}; }
  }

  async function render() {
    const prices = await loadPrices();
    const wrap = $("[data-price-rows]");
    wrap.innerHTML = PRODUCTS.map((p) => `
      <div class="price-row" data-sku="${p.sku}">
        <div>
          <div class="name">${p.name}</div>
          <div class="sku">${p.sku}</div>
        </div>
        <input type="number" step="0.01" min="0.01" value="${prices[p.sku] != null ? Number(prices[p.sku]).toFixed(2) : ""}" placeholder="0.00">
        <button class="btn btn-primary" data-save>Save</button>
        <div class="row-status"></div>
      </div>`).join("");

    wrap.querySelectorAll("[data-save]").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const row = btn.closest("[data-sku]");
        const sku = row.dataset.sku;
        const price = parseFloat(row.querySelector("input").value);
        const status = row.querySelector(".row-status");
        if (!(price > 0)) { status.textContent = "Enter a valid price."; status.style.color = "var(--rust)"; return; }
        btn.disabled = true; status.textContent = "Saving…"; status.style.color = "var(--text-muted)";
        try {
          const res = await fetch("/api/admin/update-price", {
            method: "POST",
            headers: { "Content-Type": "application/json", "x-admin-password": pw },
            body: JSON.stringify({ sku, price }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.message || "Update failed");
          status.textContent = `Saved — now $${Number(data.price).toFixed(2)}`; status.style.color = "var(--leaf)";
        } catch (err) {
          status.textContent = err.message; status.style.color = "var(--rust)";
        } finally { btn.disabled = false; }
      });
    });
  }

  async function auth() {
    pw = $("[data-admin-password]").value;
    const err = $("[data-auth-error]");
    err.textContent = "";
    // Validate by attempting a harmless authorized call (reuse pending-reviews)
    const res = await fetch("/api/admin/pending-reviews", { headers: { "x-admin-password": pw } });
    if (res.status === 403) { err.textContent = "Incorrect password."; return; }
    $("[data-auth-box]").style.display = "none";
    $("[data-panel]").style.display = "block";
    render();
  }

  $("[data-auth-btn]").addEventListener("click", auth);
  $("[data-admin-password]").addEventListener("keydown", (e) => { if (e.key === "Enter") auth(); });
})();
</script>
</body>
</html>
